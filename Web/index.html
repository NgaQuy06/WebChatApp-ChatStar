<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Đăng ký tài khoản</h1>

        <div>
            <label>Tên tài khoản</label>
            <input type="text" id="txtTenTK" placeholder="Tên tài khoản">
        </div>

        <div>
            <label>Mật khẩu</label>
            <input type="password" id="txtMK" placeholder="Mật khẩu">
        </div>

        <div>
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="txtXNMK" placeholder="Xác nhận mật khẩu">
        </div>

        <div>
            <label>Email</label>
            <input type="email" id="txtEmail" placeholder="Email">
        </div>

        <div class="g-recaptcha" data-sitekey="6LfUTessAAAAAOwNi92eP07n6mmonEBJBmS1NOtj"></div>

        <button onclick="dangKy()">Đăng ký</button>
    </div>

    <div class="overlay">
        <div>Vui lòng chờ...</div>
    </div>

    <script src="script.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
